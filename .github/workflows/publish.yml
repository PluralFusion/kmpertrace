name: Publish/release

on:
  release:
    types: [published, prereleased]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to run against (vX.Y.Z or cli-vX.Y.Z)"
        required: false
        default: ""

jobs:
  publish-runtime:
    name: Runtime release (vX.Y.Z)
    if: |
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v') && !startsWith(github.event.release.tag_name, 'cli-v')) ||
      (github.event_name == 'workflow_dispatch' && (startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) && !contains(github.event.inputs.ref, 'cli-v'))
    runs-on: macOS-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ github.event.inputs.ref }}"
          else
            raw="${{ github.event.release.tag_name }}"
          fi
          tag="${raw#refs/tags/}"
          if [[ -z "$tag" ]]; then
            echo "A release tag is required (for workflow_dispatch pass ref=vX.Y.Z)." >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Runtime releases must use tag format vX.Y.Z (optionally with prerelease/build suffix)." >&2
            echo "Got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out code
        if: ${{ env.ACT != 'true' }}
        uses: actions/checkout@v4
        with:
          # For releases, ensure we check out the exact tag commit (Package.swift is read from the tag by SwiftPM).
          # For manual runs, allow overriding the ref.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.event.release.tag_name }}

      - name: Use local workspace for ACT
        if: ${{ env.ACT == 'true' }}
        run: |
          set -euo pipefail
          echo "ACT detected; using local mounted workspace."
          pwd
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify PGP key can be read (no output on success)
        shell: bash
        env:
          KEY: ${{ secrets.SIGNING_KEY }}
          PASS: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          printf "%s\n" "$KEY" > "$tmpdir/key.asc"
          gpg --batch --quiet --import "$tmpdir/key.asc"
          printf 'ok' | gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$PASS" --clearsign >/dev/null

      - name: Publish to Maven Central
        run: ./gradlew :kmpertrace-runtime:publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Build XCFramework (Release)
        run: |
          set -euo pipefail
          ./gradlew :kmpertrace-runtime:assembleKmperTraceRuntimeReleaseXCFramework

      - name: Normalize XCFramework archives and Info.plist
        shell: bash
        run: |
          set -euo pipefail
          XCFRAMEWORK_DIR="$(cd "kmpertrace-runtime/build/XCFrameworks/release/KmperTraceRuntime.xcframework" && pwd)"

          find "$XCFRAMEWORK_DIR" -maxdepth 2 -type d -name "*.framework" -print0 | while IFS= read -r -d '' fw; do
            lib="$fw/$(basename "$fw" .framework)"
            if [ -f "$lib" ]; then
              tmpdir="$(mktemp -d)"
              (cd "$tmpdir" && ar -x "$lib")
              rm -f "$lib"
              rm -f "$tmpdir"/__.SYMDEF*
              (cd "$tmpdir" && ZERO_AR_DATE=1 ar -rcs "$lib" *.o)
              rm -rf "$tmpdir"
            fi
          done

          python3 - <<'PY'
          import plistlib
          from pathlib import Path

          path = Path("kmpertrace-runtime/build/XCFrameworks/release/KmperTraceRuntime.xcframework/Info.plist")
          data = plistlib.load(path.open("rb"))
          libs = data.get("AvailableLibraries")
          if isinstance(libs, list):
              data["AvailableLibraries"] = sorted(
                  libs,
                  key=lambda d: d.get("LibraryIdentifier", "")
              )
          with path.open("wb") as f:
              plistlib.dump(data, f, sort_keys=True)
          PY

      - name: Normalize XCFramework timestamps
        shell: bash
        run: |
          set -euo pipefail
          XCFRAMEWORK_DIR="$(cd "kmpertrace-runtime/build/XCFrameworks/release/KmperTraceRuntime.xcframework" && pwd)"
          find "$XCFRAMEWORK_DIR" -exec touch -t 198001010000 {} +

      - name: Zip XCFramework
        shell: bash
        run: |
          set -euo pipefail
          cd kmpertrace-runtime/build/XCFrameworks/release
          rm -f KmperTraceRuntime.xcframework.zip
          zip -r -X KmperTraceRuntime.xcframework.zip KmperTraceRuntime.xcframework

      - name: Verify SwiftPM checksum matches Package.swift
        shell: bash
        run: |
          set -euo pipefail

          ZIP_PATH="kmpertrace-runtime/build/XCFrameworks/release/KmperTraceRuntime.xcframework.zip"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "XCFramework zip not found at $ZIP_PATH" >&2
            exit 1
          fi

          if [ ! -f Package.swift ]; then
            echo "Package.swift not found at repo root." >&2
            ls -la
            exit 1
          fi

          # Parse checksum anywhere in the file (Package.swift may be formatted onto a single line).
          EXPECTED_CHECKSUM=$(
            perl -ne 'if (/checksum:\s*\"([^\"]+)\"/) { print $1; exit }' Package.swift || true
          )

          if [ -z "$EXPECTED_CHECKSUM" ]; then
            echo "Failed to parse checksum from Package.swift (expected to find: checksum: \"...\")" >&2
            echo "" >&2
            echo "Package.swift (first 120 lines):" >&2
            sed -n '1,120p' Package.swift >&2
            exit 1
          fi

          ACTUAL_CHECKSUM=$(swift package compute-checksum "$ZIP_PATH")

          echo "SwiftPM checksum (Package.swift): $EXPECTED_CHECKSUM"
          echo "SwiftPM checksum (built zip):     $ACTUAL_CHECKSUM"

          if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
            echo "" >&2
            echo "ERROR: SwiftPM checksum mismatch." >&2
            echo "Update Package.swift to match the built zip checksum, commit, and retag the release." >&2
            exit 1
          fi

      - name: Prepare installer assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          cp scripts/install.sh build/release-assets/install.sh
          cp scripts/install.ps1 build/release-assets/install.ps1

      - name: Save runtime assets for ACT dry run
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          out_dir="build/act-release-assets/${{ steps.meta.outputs.tag }}"
          mkdir -p "$out_dir"
          cp kmpertrace-runtime/build/XCFrameworks/release/KmperTraceRuntime.xcframework.zip "$out_dir/"
          cp build/release-assets/install.sh "$out_dir/"
          cp build/release-assets/install.ps1 "$out_dir/"
          ls -la "$out_dir"

      - name: Upload XCFramework as Release asset
        if: ${{ env.ACT != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          assets=(
            "kmpertrace-runtime/build/XCFrameworks/release/KmperTraceRuntime.xcframework.zip"
            "build/release-assets/install.sh"
            "build/release-assets/install.ps1"
          )

          for asset in "${assets[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "Release asset not found: $asset" >&2
              exit 1
            fi
          done

          for attempt in 1 2 3 4 5; do
            echo "Uploading runtime release assets (attempt $attempt/5)"
            if gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber; then
              echo "Runtime release assets uploaded successfully."
              gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY"
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Failed to upload runtime release assets after 5 attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Upload failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

  publish-cli:
    name: CLI release (cli-vX.Y.Z)
    if: |
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'cli-v')) ||
      (github.event_name == 'workflow_dispatch' && (startsWith(github.event.inputs.ref, 'cli-v') || startsWith(github.event.inputs.ref, 'refs/tags/cli-v')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve CLI tag/version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ github.event.inputs.ref }}"
          else
            raw="${{ github.event.release.tag_name }}"
          fi
          tag="${raw#refs/tags/}"
          if [[ -z "$tag" ]]; then
            echo "A release tag is required (for workflow_dispatch pass ref=cli-vX.Y.Z)." >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^cli-v([0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?)$ ]]; then
            echo "CLI releases must use tag format cli-vX.Y.Z (optionally with prerelease/build suffix)." >&2
            echo "Got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "cli_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - name: Check out code
        if: ${{ env.ACT != 'true' }}
        uses: actions/checkout@v4
        with:
          # For releases, ensure we check out the exact tag commit.
          # For manual runs, allow overriding the ref.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.event.release.tag_name }}

      - name: Use local workspace for ACT
        if: ${{ env.ACT == 'true' }}
        run: |
          set -euo pipefail
          echo "ACT detected; using local mounted workspace."
          pwd
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*', '**/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build CLI distribution archives
        run: |
          set -euo pipefail
          ./gradlew \
            :kmpertrace-cli:distZip \
            :kmpertrace-cli:distTar \
            -PkmpertraceVersion="${{ steps.meta.outputs.cli_version }}" \
            --no-configuration-cache

      - name: Generate CLI checksums
        shell: bash
        run: |
          set -euo pipefail
          cd kmpertrace-cli/build/distributions
          shasum -a 256 \
            "kmpertrace-cli-${{ steps.meta.outputs.cli_version }}.zip" \
            "kmpertrace-cli-${{ steps.meta.outputs.cli_version }}.tar" \
            > SHA256SUMS

      - name: Prepare installer assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          cp scripts/install.sh build/release-assets/install.sh
          cp scripts/install.ps1 build/release-assets/install.ps1

      - name: Save CLI assets for ACT dry run
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          out_dir="build/act-release-assets/${{ steps.meta.outputs.tag }}"
          mkdir -p "$out_dir"
          cp "kmpertrace-cli/build/distributions/kmpertrace-cli-${{ steps.meta.outputs.cli_version }}.zip" "$out_dir/"
          cp "kmpertrace-cli/build/distributions/kmpertrace-cli-${{ steps.meta.outputs.cli_version }}.tar" "$out_dir/"
          cp "kmpertrace-cli/build/distributions/SHA256SUMS" "$out_dir/"
          cp build/release-assets/install.sh "$out_dir/"
          cp build/release-assets/install.ps1 "$out_dir/"
          ls -la "$out_dir"

      - name: Upload CLI distribution assets
        if: ${{ env.ACT != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          CLI_VERSION: ${{ steps.meta.outputs.cli_version }}
        run: |
          set -euo pipefail

          assets=(
            "kmpertrace-cli/build/distributions/kmpertrace-cli-${CLI_VERSION}.zip"
            "kmpertrace-cli/build/distributions/kmpertrace-cli-${CLI_VERSION}.tar"
            "kmpertrace-cli/build/distributions/SHA256SUMS"
            "build/release-assets/install.sh"
            "build/release-assets/install.ps1"
          )

          for asset in "${assets[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "Release asset not found: $asset" >&2
              exit 1
            fi
          done

          for attempt in 1 2 3 4 5; do
            echo "Uploading CLI release assets (attempt $attempt/5)"
            if gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber; then
              echo "CLI release assets uploaded successfully."
              gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY"
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Failed to upload CLI release assets after 5 attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Upload failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
